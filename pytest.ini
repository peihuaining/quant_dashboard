[pytest]
# 测试根目录
testpaths = tests

# 默认选项
addopts =
    -v
    --tb=short
    --strict-markers
    --color=yes

# 自定义标记（消除 PytestUnknownMarkWarning）
markers =
    integration: 集成测试，需要 API 服务运行在 127.0.0.1:9001
    unit: 单元测试，无需外部依赖

# 忽略无害警告
filterwarnings =
    ignore::RuntimeWarning:unittest.mock
    ignore::DeprecationWarning

# 超时（需要 pytest-timeout；集成测试最慢约 50s）
# timeout = 120

# 输出配置
log_cli = false
